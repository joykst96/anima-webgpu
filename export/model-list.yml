# Anima WebGPU 모델 목록 — gen_models.py가 이 파일을 읽어 index.html에 주입한다.
#   python gen_models.py export/model-list.yml web/index.html
#
# 이 파일은 git용 기본 목록(원본 anima만). 파인튜닝 모델은 배포 인스턴스에서
# 별도 목록으로 관리한다. 모델 추가 워크플로우:
#   1. build_dit.bat <ckpt> <key>   → out/dit/{key}_dit_*.onnx 산출
#   2. models: 에 항목 추가 (key = build_dit prefix)
#   3. python gen_models.py export/model-list.yml web/index.html
#
# 경로 규칙 (key + variant):
#   base  out/dit/{key}_dit_dyn32_q8a4f{ns,Ls}.onnx
#   turbo out/dit/{key}_dit_turbo32_q8a4f{ns,Ls}.onnx

prompt_defaults:
  positive: "masterpiece, best quality, score_7, safe"
  negative: "worst quality, low quality, score_1, score_2, score_3, artist name, nsfw"

paths:
  te: out/text_encoder/qwen3_06b_s.onnx
  adapter: out/adapter/anima_llm_adapter.onnx
  vae: out/vae/qwen_image_vae_decoder_dyn32_2dc.onnx

defaults:
  base:
    steps: 30
    cfg: 5.0
    sampler: er_sde
    scheduler: simple
    label_suffix: "(베이스 · 30스텝 · CFG 5)"
  turbo:
    steps: 8
    cfg: 1.0
    sampler: euler
    scheduler: simple
    label_suffix: "(8스텝 · CFG 1)"

selected: anima_turbo

models:
  - key: anima
    label: Anima
    variants: [base, turbo]
    overrides:
      turbo:
        label: "Anima+Turbo v0.2"
