server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    sendfile on;
    tcp_nopush on;
    # 바이너리 가중치에 gzip은 무의미 (압축률 ~0, CPU 낭비)
    gzip off;

    # 가중치: 불변 캐시 1년 (파일 교체 시 반드시 새 파일명 사용)
    location ~* \.(bin|onnx|data)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # manifest: 하루 (샤드 구성이 바뀔 수 있는 유일한 메타파일)
    location ~* manifest\.json$ {
        add_header Cache-Control "public, max-age=86400";
    }

    # 토크나이저: 하루
    location ^~ /tokenizers/ {
        add_header Cache-Control "public, max-age=86400";
    }

    # 페이지: 항상 재검증 (배포 갱신 즉시 반영)
    location = / {
        add_header Cache-Control "no-cache";
        try_files /index.html =404;
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
